<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forex Position Size Calculator</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#1e293b;
    padding:30px;
    border-radius:12px;
    width:360px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

label{
    font-size:14px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:6px;
    border:none;
    font-size:14px;
}

.radio-group{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#0f172a;
    border-radius:8px;
    text-align:center;
    font-size:20px;
}

</style>
</head>

<body>

<div class="container">

<h2>Position Size Calculator</h2>

<label>Account Balance ($)</label>
<input type="number" id="balance" placeholder="1000">

<div class="radio-group">
<label><input type="radio" name="riskType" value="percent" checked> Risk %</label>
<label><input type="radio" name="riskType" value="money"> Risk $</label>
</div>

<label>Risk %</label>
<input type="number" id="riskPercent" placeholder="1">

<label>Risk Money ($)</label>
<input type="number" id="riskMoney" placeholder="10">

<label>Stop Loss (pips)</label>
<input type="number" id="stoploss" placeholder="50">

<button onclick="calculate()">Calculate Lot Size</button>

<div class="result">
Lot Size: <span id="lotSize">0.00</span>
</div>

</div>

<script>

function calculate(){

let balance = parseFloat(document.getElementById("balance").value);
let riskPercent = parseFloat(document.getElementById("riskPercent").value);
let riskMoneyInput = parseFloat(document.getElementById("riskMoney").value);
let stoploss = parseFloat(document.getElementById("stoploss").value);

let riskType = document.querySelector('input[name="riskType"]:checked').value;

let riskMoney;

if(riskType === "percent"){
    riskMoney = balance * (riskPercent / 100);
}else{
    riskMoney = riskMoneyInput;
}

let lotSize = riskMoney / (stoploss * 10);

lotSize = lotSize.toFixed(2);

document.getElementById("lotSize").innerText = lotSize;

}

</script>

</body>
</html>
